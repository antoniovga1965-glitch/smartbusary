<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Password Reset</title>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8 border border-gray-200">
    
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Reset Your Password</h1>
    
    <p class="text-gray-600 text-center text-sm mb-6">
      Enter a new password below and confirm it to update your account.
    </p>
    
    <label class="block text-gray-700 font-medium text-xs uppercase tracking-wide mb-1" for="password">
      New Password
    </label>
    <input type="password" id="password" placeholder="Enter new password"
           class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-500 text-sm mb-4 transition">

    <label class="block text-gray-700 font-medium text-xs uppercase tracking-wide mb-1" for="confirmpassword">
      Confirm Password
    </label>
    <input type="password" id="confirmpassword" placeholder="Re-enter new password"
           class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-500 text-sm mb-6 transition">

    <!-- <button id=""
            class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors">
     
    </button> -->



     <button 
  id="savebtn"
  class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition duration-200 flex items-center justify-center gap-2">
  <div id="spinner" class="hidden w-3 h-3 border-2 border-white border-t-black rounded-full animate-spin"></div>
  <span id="btntext">Save Password</span>
</button>




    <p id="results" class="text-center text-sm font-medium text-red-600 mt-4"></p>

  </div>

   
  <script>
    const password = document.getElementById('password');
    const confirmpassword  =document.getElementById('confirmpassword');
    const savebtn = document.getElementById('savebtn');
    const results  = document.getElementById('results');
    const spinner = document.getElementById('spinner');

    savebtn.addEventListener('click',()=>{
        const PASSWORD = password.value.trim();
        const COnfirmpass = confirmpassword.value.trim();

        if(!PASSWORD||!COnfirmpass){
            results.textContent = 'please set a new password';
        
        }
        else if(PASSWORD!==COnfirmpass){
        results.textContent = 'Password do not match';

        setTimeout(() => {
             results.classList.add('hidden');
        }, 4000);
        return;

        }
        const token  = new URLSearchParams(window.location.search).get('token')

        spinner.classList.remove('hidden');
        fetch('/sendemail/savenewpassword',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({token,PASSWORD})
        }).then(res=>res.json())
        .then(data=>{
            spinner.classList.add('hidden')
            results.textContent = data.message;
        })
        .catch(err=>{
            console.log(err);
            
        })
        password.value="";
        confirmpassword.value="";
        
    })
  </script>

</body>
</html>
