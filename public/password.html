<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Smart Bursary</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #0a1f0e;
      --green-mid: #14532d;
      --green-accent: #22c55e;
      --green-light: #86efac;
      --green-glow: rgba(34, 197, 94, 0.15);
      --text-primary: #f0fdf4;
      --text-muted: #86efac;
    }

    body {
      min-height: 100vh;
      background: var(--green-dark);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background mesh */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(34, 197, 94, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(20, 83, 45, 0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 50%, rgba(10, 31, 14, 0.8) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Animated grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(34, 197, 94, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 197, 94, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo area */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 100px;
      padding: 8px 20px;
      margin-bottom: 16px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      background: var(--green-accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green-accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--green-accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Card */
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(34, 197, 94, 0.15);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(20px);
      box-shadow: 
        0 0 0 1px rgba(34, 197, 94, 0.05),
        0 32px 64px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .card-header {
      margin-bottom: 32px;
    }

    .card-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.05));
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 22px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      opacity: 0.7;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--green-light);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(134, 239, 172, 0.4);
      font-size: 16px;
      pointer-events: none;
    }

    input[type="password"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(34, 197, 94, 0.15);
      border-radius: 12px;
      padding: 14px 44px 14px 44px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      outline: none;
    }

    input[type="password"]::placeholder {
      color: rgba(134, 239, 172, 0.3);
    }

    input[type="password"]:focus {
      border-color: rgba(34, 197, 94, 0.5);
      background: rgba(34, 197, 94, 0.05);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(134, 239, 172, 0.4);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: var(--green-accent);
    }

    /* Password strength */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .strength-segment {
      height: 3px;
      flex: 1;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.08);
      transition: background 0.3s ease;
    }

    .strength-segment.weak { background: #ef4444; }
    .strength-segment.fair { background: #f97316; }
    .strength-segment.good { background: #eab308; }
    .strength-segment.strong { background: var(--green-accent); }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      margin-top: 8px;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.2);
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(34, 197, 94, 0.3);
    }

    .submit-btn:hover::before { opacity: 1; }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Result message */
    #results {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      display: none;
    }

    #results.success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: var(--green-accent);
      display: block;
    }

    #results.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      display: block;
    }

    /* Back link */
    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      font-size: 13px;
      color: rgba(134, 239, 172, 0.5);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: var(--green-accent);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(34, 197, 94, 0.2), transparent);
      margin: 28px 0;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo-area">
      <div class="logo-badge">
        <div class="logo-dot"></div>
        <span class="logo-text">Smart Bursary Portal</span>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon">🔐</div>
        <h1 class="card-title">Set New Password</h1>
        <p class="card-subtitle">Choose a strong password to secure your account.</p>
      </div>

      <div class="form-group">
        <label for="password">New Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input type="password" id="password" placeholder="Enter new password">
          <button class="toggle-password" onclick="toggleVisibility('password', this)" type="button">👁</button>
        </div>
        <div class="strength-bar">
          <div class="strength-segment" id="s1"></div>
          <div class="strength-segment" id="s2"></div>
          <div class="strength-segment" id="s3"></div>
          <div class="strength-segment" id="s4"></div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmpassword">Confirm Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="confirmpassword" placeholder="Re-enter your password">
          <button class="toggle-password" onclick="toggleVisibility('confirmpassword', this)" type="button">👁</button>
        </div>
      </div>

      <div class="divider"></div>

      <button class="submit-btn" id="savebtn">
        Reset Password
      </button>

      <p id="results"></p>
    </div>

    <div class="back-link">
      <a href="/index.html">← Back to Login</a>
    </div>

  </div>

  <script>
    const password = document.getElementById('password');
    const confirmpassword = document.getElementById('confirmpassword');
    const savebtn = document.getElementById('savebtn');
    const results = document.getElementById('results');

    function toggleVisibility(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    function showResult(message, type) {
      results.textContent = message;
      results.className = type;
      setTimeout(() => {
        results.className = '';
        results.textContent = '';
      }, 5000);
    }

    
    password.addEventListener('input', () => {
      const val = password.value;
      const segments = [
        document.getElementById('s1'),
        document.getElementById('s2'),
        document.getElementById('s3'),
        document.getElementById('s4'),
      ];

      segments.forEach(s => s.className = 'strength-segment');

      if (val.length === 0) return;

      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const classes = ['weak', 'fair', 'good', 'strong'];
      for (let i = 0; i < score; i++) {
        segments[i].classList.add(classes[Math.min(score - 1, 3)]);
      }
    });

    savebtn.addEventListener('click', async () => {
      const PASSWORD = password.value.trim();
      const confirmPass = confirmpassword.value.trim();

      if (!PASSWORD || !confirmPass) {
        showResult('Please fill in both password fields.', 'error');
        return;
      }

      if (PASSWORD.length < 6) {
        showResult('Password must be at least 6 characters.', 'error');
        return;
      }

      if (PASSWORD !== confirmPass) {
        showResult('Passwords do not match.', 'error');
        return;
      }

      const token = new URLSearchParams(window.location.search).get('token');

      if (!token) {
        showResult('Invalid or expired reset link.', 'error');
        return;
      }

      savebtn.disabled = true;
      savebtn.textContent = '⏳ Saving...';

      try {
        const res = await fetch('/sendemail/savenewpassword', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, PASSWORD })
        });

        const data = await res.json();
        showResult(data.message, res.ok ? 'success' : 'error');

        if (res.ok) {
          password.value = '';
          confirmpassword.value = '';
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 2000);
        }
      } catch (err) {
        showResult('Something went wrong. Please try again.', 'error');
      } finally {
        savebtn.disabled = false;
        savebtn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
